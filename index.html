<!DOCTYPE html>
<html lang="en">
 
<head>
 <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
 <link rel="icon" type="image/svg+xml" href="favicon.svg" />
 <link rel="shortcut icon" href="favicon.ico" />
 <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
 <link rel="manifest" href="site.webmanifest" />
 <link rel="manifest" href="manifest.json">
 <meta name="theme-color" content="#2563eb">
  <meta charset="UTF-8" />
  <meta
  name="viewport"
  content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Just Chat">
  <title>Just Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
     html {
    -webkit-text-size-adjust: 100%;
      }
    
    :root{
      --bg:#0f0f0f;
      --panel:#151515;
      --panel-2:#1b1b1b;
      --border:#262626;
      --text:#ffffff;
      --muted:#a8a8a8;
      --accent:#2563eb;
      --accent-2:#3b82f6;
      --friend:#2a2a2a;
      --danger:#ef4444;
      --success:#22c55e;
      --shadow: 0 16px 40px rgba(0,0,0,.35);
      --radius: 22px;
    }

    * { box-sizing:border-box; }
    html, body {
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
   body{
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    
      padding-top: env(safe-area-inset-top);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      }

    .app {
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:stretch;
    }

    .shell {
      width:100%;
      max-width: 760px;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      background:
        radial-gradient(1200px 800px at 50% -10%, rgba(37,99,235,.12), transparent 50%),
        linear-gradient(180deg, rgba(255,255,255,.02), transparent 180px);
    }

    .screen {
      display:none;
      flex:1;
      min-height:100dvh;
      padding:20px;
    }
    .screen.active { display:flex; }

    /* Join screen */
    .join-wrap{
      width:100%;
      max-width: 480px;
      margin:auto;
      display:flex;
      flex-direction:column;
      gap:18px;
    }
    .brand {
      display:flex;
      align-items:center;
      gap:12px;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight:700;
      letter-spacing:-0.04em;
      line-height:1;
      margin-top: 8px;
    }
    .brand .bolt {
      width:48px;
      height:48px;
      display:grid;
      place-items:center;
      border-radius:16px;
      background: rgba(37,99,235,.14);
      color: var(--accent-2);
      box-shadow: inset 0 0 0 1px rgba(59,130,246,.18);
      flex: 0 0 auto;
    }
    .card {
      background: rgba(21,21,21,.92);
      border:1px solid var(--border);
      border-radius: 28px;
      padding:22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .field {
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:14px;
    }
    label {
      color: var(--muted);
      font-size: .9rem;
      font-weight: 500;
    }
    input, button, a {
      font: inherit;
    }
    .text-input,
      #displayName,
      #roomCode,
      #messageInput,
      textarea,
      input {
    font-size: 16px;
    }
    .text-input {
      width:100%;
      border:1px solid var(--border);
      background: #101010;
      color:var(--text);
      border-radius:18px;
      padding:16px 16px;
      outline:none;
      transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
    }
    .text-input:focus{
      border-color: rgba(59,130,246,.72);
      box-shadow: 0 0 0 4px rgba(37,99,235,.15);
    }
    .room-input {
      text-align:center;
      letter-spacing: .35em;
      font-size: 1.5rem;
      font-weight: 700;
      padding: 18px 16px 18px 18px;
      user-select: text;
    }
    .helper {
      color: var(--muted);
      font-size: .92rem;
      line-height:1.45;
    }
    .btn {
      border:0;
      border-radius:18px;
      padding:15px 16px;
      color:white;
      background: var(--accent);
      font-weight:700;
      cursor:pointer;
      transition: transform .15s ease, filter .15s ease, opacity .15s ease;
      box-shadow: 0 12px 26px rgba(37,99,235,.22);
    }
    .btn:hover { filter: brightness(1.06); }
    .btn:active { transform: translateY(1px) scale(.99); }
    .btn.secondary {
      background: #1c1c1c;
      border:1px solid var(--border);
      box-shadow:none;
      font-weight:600;
    }
    .row {
      display:flex;
      gap:10px;
      align-items:center;
    }
    .row > * { flex:1; }
    .note {
      margin-top:4px;
      color: #b6b6b6;
      font-size: .84rem;
      text-align:center;
    }

    /* Chat screen */
    .chat-wrap {
      flex:1;
      display:flex;
      flex-direction:column;
      min-height:100dvh;
      gap:12px;
    }
    .chat-header {
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      position:sticky;
      top:0;
      z-index:10;
      padding:16px 0 8px;
      background: linear-gradient(180deg, rgba(15,15,15,.98), rgba(15,15,15,.88), rgba(15,15,15,0));
      backdrop-filter: blur(8px);
    }
    .title-block {
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }
    .chat-title {
      font-size: clamp(1.1rem, 4.8vw, 1.45rem);
      font-weight:700;
      letter-spacing:-0.03em;
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:8px;
      min-width:0;
    }
    .room-pill {
      font-size:.95rem;
      color: #dbe7ff;
      background: rgba(37,99,235,.12);
      border:1px solid rgba(59,130,246,.16);
      padding: 5px 10px;
      border-radius:999px;
      white-space:nowrap;
    }
    .top-actions {
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
    }
    .icon-btn {
      width:42px;
      height:42px;
      border-radius:14px;
      border:1px solid var(--border);
      background: rgba(24,24,24,.95);
      color: white;
      cursor:pointer;
      display:grid;
      place-items:center;
      transition: transform .15s ease, background .15s ease;
    }
    .icon-btn:hover { background:#1d1d1d; }
    .icon-btn:active { transform: scale(.98); }

    .link-btn {
      border:none;
      background:transparent;
      color:#8fb4ff;
      padding:0;
      cursor:pointer;
      font-size:.92rem;
      text-decoration:none;
    }
    .link-btn:hover { text-decoration:underline; }

    .status {
      display:flex;
      align-items:center;
      gap:8px;
      font-size:.92rem;
      color: var(--muted);
      margin-top:2px;
    }
    .dot {
      width:10px;
      height:10px;
      border-radius:50%;
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(34,197,94,.12);
      flex:0 0 auto;
    }
    .dot.offline {
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(239,68,68,.12);
    }

    .messages {
      flex:1;
      overflow-y:auto;
      padding: 4px 0 14px;
      display:flex;
      flex-direction:column;
      gap:12px;
      scroll-behavior:smooth;
    }
    .message-row {
      display:flex;
      flex-direction:column;
      gap:4px;
      max-width: 100%;
      animation: fadeUp .18s ease-out both;
    }
    .message-row.own {
      align-items:flex-end;
      margin-left:auto;
      max-width: 100%;
    }
    .message-row.friend {
      align-items:flex-start;
      margin-right:auto;
    }
    .sender {
      font-size:.79rem;
      color: #cfcfcf;
      padding: 0 4px;
    }
    .bubble {
      max-width:min(82vw, 560px);
      border-radius: 20px;
      padding: 12px 14px;
      line-height:1.42;
      white-space:pre-wrap;
      word-break:break-word;
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
      border:1px solid transparent;
    }
    .own .bubble {
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
      color:white;
      border-top-right-radius: 10px;
    }
    .friend .bubble {
      background: var(--friend);
      color:white;
      border-top-left-radius: 10px;
      border-color: rgba(255,255,255,.04);
    }
    .meta {
      font-size:.76rem;
      color: #a5a5a5;
      padding: 0 4px;
    }
    .pending .bubble {
      opacity: .72;
    }
    .pending .meta::after {
      content:" • sending…";
      color:#8fb4ff;
    }

    .composer {
      display:flex;
      gap:10px;
      align-items:flex-end;
      padding: 12px;
      border-radius: 24px;
      background: rgba(18,18,18,.96);
      border:1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 8px;
      position: sticky;
      bottom: calc(env(safe-area-inset-bottom) + 8px);
    }
    .composer .text-input {
      min-height: 50px;
      max-height: 180px;
      resize:none;
      line-height:1.35;
      border-radius:18px;
      padding:15px 16px;
      flex:1;
    }
    .send-btn {
      flex:0 0 auto;
      min-width: 88px;
      height: 50px;
      border-radius:18px;
      border:0;
      background: var(--accent);
      color:white;
      font-weight:700;
      cursor:pointer;
      padding: 0 18px;
      box-shadow: 0 12px 26px rgba(37,99,235,.22);
    }
    .send-btn:disabled {
      opacity:.5;
      cursor:not-allowed;
      box-shadow:none;
    }
    .counter {
      position:absolute;
      right: 126px;
      bottom: -22px;
      font-size:.78rem;
      color: var(--muted);
    }
    .counter.warn { color:#f59e0b; }
    .counter.danger { color:#f87171; }

    .footer {
      text-align:center;
      color:#8f8f8f;
      font-size:.82rem;
      padding: 0 0 6px;
    }

    /* Modal */
    .overlay {
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.62);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      z-index:100;
    }
    .overlay.open { display:flex; }
    .modal {
      width:min(92vw, 340px);
      border-radius: 24px;
      background: #141414;
      border: 1px solid #2b2b2b;
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .modal-head {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom: 14px;
    }
    .modal-title {
      font-weight:700;
      letter-spacing:-0.02em;
    }
    .qr-box {
      width:100%;
      min-height: 160px;
      display:grid;
      place-items:center;
      border-radius: 20px;
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      overflow:hidden;
      padding: 14px;
    }
    .qr-fallback {
      color: var(--muted);
      text-align:center;
      font-size:.92rem;
      line-height:1.45;
    }
    .qr-code-text {
      margin-top: 10px;
      font-size: 1.1rem;
      font-weight:700;
      letter-spacing:.26em;
      text-align:center;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(6px); }
      to { opacity:1; transform: translateY(0); }
    }

    @media (max-width: 420px) {
      .screen { padding: 16px; }
      .brand { font-size: 2rem; }
      .composer {
        gap:8px;
        padding:10px;
      }
      .send-btn {
        min-width: 78px;
        padding:0 12px;
      }
      .counter { right: 108px; }
      .bubble { max-width: 84vw; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <!-- JOIN SCREEN -->
      <section id="joinScreen" class="screen active" aria-label="Join screen">
        <div class="join-wrap">
          <div class="brand">
            <div class="bolt">⚡</div>
            <div>Just Chat</div>
          </div>

          <div class="card">
            <div class="field">
              <label for="displayName">Display name</label>
              <input id="displayName" class="text-input" type="text" placeholder="Enter your name" autocomplete="name" maxlength="32" />
            </div>

            <div class="field">
              <label for="roomCode">6-digit room code</label>
              <input id="roomCode" class="text-input room-input" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="000000" maxlength="6" autocomplete="one-time-code" autofocus />
            </div>

            <div class="row" style="margin-top:10px;">
              <button id="generateCodeBtn" class="btn secondary" type="button">🎲 Generate Code</button>
              <button id="joinBtn" class="btn" type="button">Join Room</button>
            </div>

            <div class="helper" style="margin-top:14px; text-align:center;">
              Share your 6-digit code with your friend to chat
            </div>
          </div>

          <div class="note">Messages are private to your room code</div>
        </div>
      </section>

      <!-- CHAT SCREEN -->
      <section id="chatScreen" class="screen" aria-label="Chat screen">
        <div class="chat-wrap">
          <header class="chat-header">
            <div class="title-block">
              <div class="chat-title">
                <span>Just Chat</span>
                <span class="room-pill" id="roomTitle">Room: ------</span>
              </div>
              <div class="status" id="statusLine">
                <span class="dot offline" id="statusDot"></span>
                <span id="statusText">Offline — messages will send when back</span>
              </div>
            </div>

            <div class="top-actions">
              <button id="qrBtn" class="icon-btn" type="button" title="Show room QR code" aria-label="Show room QR code">▣</button>
              <button id="copyBtn" class="icon-btn" type="button" title="Copy room code" aria-label="Copy room code">⧉</button>
              <button id="leaveBtn" class="link-btn" type="button">Leave Room</button>
            </div>
          </header>

          <main id="messages" class="messages" aria-live="polite" aria-label="Messages"></main>

          <form id="composer" class="composer" autocomplete="off">
            <div style="position:relative; flex:1;">
              <textarea id="messageInput" class="text-input" rows="1" maxlength="500" placeholder="Type a message..."></textarea>
              <div id="charCounter" class="counter" style="display:none;">0/500</div>
            </div>
            <button id="sendBtn" class="send-btn" type="submit">Send</button>
          </form>

          <div class="footer">Messages are private to your room code</div>
        </div>
      </section>
    </div>
  </div>

  <div id="qrOverlay" class="overlay" aria-hidden="true">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">Room QR</div>
        <button id="closeQrBtn" class="icon-btn" type="button" aria-label="Close QR popup" style="width:36px;height:36px;border-radius:12px;">✕</button>
      </div>
      <div class="qr-box">
        <div>
          <div id="qrMount"></div>
          <div id="qrFallback" class="qr-fallback" style="display:none;">
            QR code library was not available.<br>
            Share the room code manually.
          </div>
          <div id="qrText" class="qr-code-text">------</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // SECURITY NOTE:
    // Update your Firebase Realtime Database rules before production.
    //
    // {
    //   "rules": {
    //     "rooms": {
    //       "$roomCode": {
    //         ".read": true,
    //         ".write": true
    //       }
    //     }
    //   }
    // }
    // ============================================================

    // Replace these with your own Firebase project settings when needed.
    const firebaseConfig = {
      apiKey: "AIzaSyCySQZCq9gseFXe0HlTDfF2H8AEiu3dtBs",
      authDomain: "oluwa007-bacad.firebaseapp.com",
      projectId: "oluwa007-bacad",
      storageBucket: "oluwa007-bacad.firebasestorage.app",
      messagingSenderId: "957434896977",
      appId: "1:957434896977:web:32b7b5d22edf9972f0ce70",
      measurementId: "G-S9FD4YTB8P"
    };

    // ---- DOM ----
    const joinScreen = document.getElementById('joinScreen');
    const chatScreen = document.getElementById('chatScreen');
    const displayNameInput = document.getElementById('displayName');
    const roomCodeInput = document.getElementById('roomCode');
    const generateCodeBtn = document.getElementById('generateCodeBtn');
    const joinBtn = document.getElementById('joinBtn');
    const roomTitle = document.getElementById('roomTitle');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const messagesEl = document.getElementById('messages');
    const composer = document.getElementById('composer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const copyBtn = document.getElementById('copyBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const qrBtn = document.getElementById('qrBtn');
    const qrOverlay = document.getElementById('qrOverlay');
    const closeQrBtn = document.getElementById('closeQrBtn');
    const qrMount = document.getElementById('qrMount');
    const qrFallback = document.getElementById('qrFallback');
    const qrText = document.getElementById('qrText');
    const charCounter = document.getElementById('charCounter');

    // ---- State ----
    let app = null;
    let db = null;
    let currentRoomCode = '';
    let roomMessagesRef = null;
    let roomMessagesQuery = null;
    let connectedRef = null;
    let connectedListener = null;
    let messageListener = null;
    let currentUserName = '';
    let firebaseConnected = false;
    let currentPresenceOnline = navigator.onLine;
    let initialSyncDone = false;
    const bufferedRealtimeEvents = [];
    const seenKeys = new Set();
    const pendingByLocalId = new Map();
    const myClientId = getOrCreateClientId();

    // --- Helpers ---
    function getOrCreateClientId() {
      const key = 'offchat_client_id';
      let id = sessionStorage.getItem(key);
      if (!id) {
        id = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : `cid_${Date.now()}_${Math.random().toString(16).slice(2)}`;
        sessionStorage.setItem(key, id);
      }
      return id;
    }

    function safeString(v) {
      return String(v ?? '').trim();
    }

    function sanitizeRoomCode(value) {
      return safeString(value).replace(/\D/g, '').slice(0, 6);
    }

    function generateRoomCode() {
      return String(Math.floor(100000 + Math.random() * 900000));
    }

    function pad2(n) {
      return String(n).padStart(2, '0');
    }

    function formatTime(ms) {
      const d = new Date(ms || Date.now());
      return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    function setScreen(screen) {
      joinScreen.classList.toggle('active', screen === 'join');
      chatScreen.classList.toggle('active', screen === 'chat');
    }

    function setStatus(online) {
      const showConnected = !!online;
      firebaseConnected = showConnected;
      currentPresenceOnline = navigator.onLine;
      const actualOnline = showConnected && currentPresenceOnline;

      statusDot.classList.toggle('offline', !actualOnline);
      if (actualOnline) {
        statusText.textContent = 'Connected';
      } else {
        statusText.textContent = 'Offline — messages will send when back';
      }
    }

    function updateSendState() {
      const hasText = safeString(messageInput.value).length > 0;
      sendBtn.disabled = !hasText || !currentRoomCode;
      const len = messageInput.value.length;
      if (len >= 400) {
        charCounter.style.display = 'block';
        charCounter.textContent = `${len}/500`;
        charCounter.classList.toggle('warn', len >= 400 && len < 480);
        charCounter.classList.toggle('danger', len >= 480);
      } else if (len > 0) {
        charCounter.style.display = 'none';
      } else {
        charCounter.style.display = 'none';
      }
    }

    function sanitizeAndRestoreName() {
      const saved = localStorage.getItem('offchat_display_name');
      if (saved) displayNameInput.value = saved;
    }

    function saveName() {
      const name = safeString(displayNameInput.value).slice(0, 32);
      if (name) localStorage.setItem('offchat_display_name', name);
      return name;
    }

    function clearMessagesUI() {
      messagesEl.innerHTML = '';
      seenKeys.clear();
      pendingByLocalId.clear();
    }

    function playPop() {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        const ctx = new AudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = 'sine';
        osc.frequency.value = 740;
        gain.gain.value = 0.0001;

        osc.connect(gain);
        gain.connect(ctx.destination);

        const now = ctx.currentTime;
        gain.gain.exponentialRampToValueAtTime(0.05, now + 0.01);
        osc.frequency.exponentialRampToValueAtTime(520, now + 0.08);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);

        osc.start(now);
        osc.stop(now + 0.16);
        osc.onended = () => ctx.close().catch(() => {});
      } catch (err) {
        // Silent fallback.
      }
    }

    function createMessageNode(data, { own = false, pending = false } = {}) {
      const row = document.createElement('div');
      row.className = `message-row ${own ? 'own' : 'friend'}${pending ? ' pending' : ''}`;
      row.dataset.localId = data.localId || '';
      row.dataset.key = data.key || '';

      const sender = document.createElement('div');
      sender.className = 'sender';
      sender.textContent = own ? (data.sender || currentUserName || 'You') : (data.sender || 'Friend');

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = data.text || '';

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = formatTime(data.timestamp);

      row.appendChild(sender);
      row.appendChild(bubble);
      row.appendChild(meta);

      return row;
    }

    function renderMessage(data, { own = false, pending = false, prependKey = null } = {}) {
      const node = createMessageNode(data, { own, pending });
      if (prependKey) node.dataset.key = prependKey;
      messagesEl.appendChild(node);
      scrollToBottom();
      return node;
    }
   
    function confirmPendingMessage(localId, key, data) {
      const node = pendingByLocalId.get(localId);
      if (!node) return false;
      node.classList.remove('pending');
      node.dataset.key = key;
      const senderEl = node.querySelector('.sender');
      const metaEl = node.querySelector('.meta');
      const bubbleEl = node.querySelector('.bubble');

      if (senderEl && data.sender) senderEl.textContent = data.sender;
      if (metaEl && data.timestamp) metaEl.textContent = formatTime(data.timestamp);
      if (bubbleEl && data.text) bubbleEl.textContent = data.text;

      pendingByLocalId.delete(localId);
      return true;
    }

    function attachConnectionListener() {
      if (!db) return;
      if (connectedRef) {
        try { connectedRef.off(); } catch (_) {}
      }
      connectedRef = db.ref('.info/connected');
      connectedListener = (snap) => {
        const connected = !!snap.val();
        setStatus(connected);
      };
      connectedRef.on('value', connectedListener);
      window.addEventListener('online', onNetworkChange);
      window.addEventListener('offline', onNetworkChange);
    }

    function onNetworkChange() {
      currentPresenceOnline = navigator.onLine;
      setStatus(firebaseConnected);
    }

    function detachNetworkListener() {
      window.removeEventListener('online', onNetworkChange);
      window.removeEventListener('offline', onNetworkChange);
    }

    function detachRoomListeners() {
      if (roomMessagesQuery && messageListener) {
        try { roomMessagesQuery.off('child_added', messageListener); } catch (_) {}
      }
      if (connectedRef && connectedListener) {
        try { connectedRef.off('value', connectedListener); } catch (_) {}
      } else if (connectedRef) {
        try { connectedRef.off(); } catch (_) {}
      }
      roomMessagesRef = null;
      roomMessagesQuery = null;
      messageListener = null;
      connectedRef = null;
      connectedListener = null;
      detachNetworkListener();
    }

    function openQrPopup() {
      if (!currentRoomCode) return;
      qrOverlay.classList.add('open');
      qrOverlay.setAttribute('aria-hidden', 'false');
      qrText.textContent = currentRoomCode;
      qrMount.innerHTML = '';

      if (window.QRCode) {
        qrFallback.style.display = 'none';
        try {
          // Render a compact QR code for the room code itself.
          new QRCode(qrMount, {
            text: currentRoomCode,
            width: 144,
            height: 144,
            colorDark: '#ffffff',
            colorLight: '#0f0f0f',
            correctLevel: QRCode.CorrectLevel.M
          });
        } catch (err) {
          qrFallback.style.display = 'block';
        }
      } else {
        qrFallback.style.display = 'block';
      }
    }

    function closeQrPopup() {
      qrOverlay.classList.remove('open');
      qrOverlay.setAttribute('aria-hidden', 'true');
    }

    function copyRoomCode() {
      if (!currentRoomCode) return;
      const text = currentRoomCode;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => flashCopyState(), () => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); flashCopyState(); } catch (_) {}
      document.body.removeChild(ta);
    }

    function flashCopyState() {
      const original = copyBtn.textContent;
      copyBtn.textContent = '✓';
      setTimeout(() => copyBtn.textContent = original, 900);
    }

    function normalizeLoadedMessages(snapshotVal) {
      const out = [];
      if (!snapshotVal) return out;
      for (const [key, msg] of Object.entries(snapshotVal)) {
        if (!msg || typeof msg !== 'object') continue;
        out.push({
          key,
          sender: safeString(msg.sender).slice(0, 32) || 'Unknown',
          text: safeString(msg.text).slice(0, 500),
          timestamp: Number(msg.timestamp) || Date.now(),
          clientId: safeString(msg.clientId),
          localId: safeString(msg.localId)
        });
      }
      out.sort((a, b) => (a.timestamp - b.timestamp) || a.key.localeCompare(b.key));
      return out;
    }

    async function loadExistingMessages() {
      if (!roomMessagesRef) return;
      const snap = await roomMessagesRef.orderByChild('timestamp').once('value');
      const messages = normalizeLoadedMessages(snap.val());
      messages.forEach((msg) => {
        seenKeys.add(msg.key);
        const own = msg.clientId && msg.clientId === myClientId;
        renderMessage(msg, { own, pending: false, prependKey: msg.key });
      });
      scrollToBottom();
    }

    function handleRealtimeMessage(data) {
      if (data.clientId === myClientId && data.localId && confirmPendingMessage(data.localId, data.key, data)) {
        seenKeys.add(data.key);
        scrollToBottom();
        return;
      }

      if (seenKeys.has(data.key)) return;
      seenKeys.add(data.key);

      const own = data.clientId === myClientId;
      renderMessage(data, { own, pending: false, prependKey: data.key });
      if (!own) playPop();
    }

    function flushBufferedRealtimeEvents() {
      if (!bufferedRealtimeEvents.length) return;
      const batch = bufferedRealtimeEvents.splice(0, bufferedRealtimeEvents.length);
      batch
        .sort((a, b) => (a.timestamp - b.timestamp) || a.key.localeCompare(b.key))
        .forEach((item) => handleRealtimeMessage(item));
      scrollToBottom();
    }

    function attachMessageListener() {
      if (!roomMessagesRef) return;
      roomMessagesQuery = roomMessagesRef.orderByChild('timestamp');
      messageListener = (snap) => {
        const msg = snap.val() || {};
        const data = {
          key: snap.key,
          sender: safeString(msg.sender).slice(0, 32) || 'Unknown',
          text: safeString(msg.text).slice(0, 500),
          timestamp: Number(msg.timestamp) || Date.now(),
          clientId: safeString(msg.clientId),
          localId: safeString(msg.localId)
        };

        if (!initialSyncDone) {
          bufferedRealtimeEvents.push(data);
          return;
        }

        handleRealtimeMessage(data);
      };
      roomMessagesQuery.on('child_added', messageListener);
    }

    async function enterRoom() {
      const name = saveName();
      const code = sanitizeRoomCode(roomCodeInput.value);

      if (!name) {
        displayNameInput.focus();
        displayNameInput.select();
        return;
      }
      if (code.length !== 6) {
        roomCodeInput.focus();
        roomCodeInput.select();
        return;
      }

      currentUserName = name;
      currentRoomCode = code;
      roomTitle.textContent = `Room: ${currentRoomCode}`;

      clearMessagesUI();
      detachRoomListeners();

      setScreen('chat');
      updateSendState();
      setStatus(navigator.onLine);

      roomMessagesRef = firebase.database().ref(`rooms/${currentRoomCode}/messages`);
      initialSyncDone = false;
      attachMessageListener();
      await loadExistingMessages();
      initialSyncDone = true;
      flushBufferedRealtimeEvents();
      attachConnectionListener();

      messageInput.focus();
      scrollToBottom();
    }

    function leaveRoom() {
      detachRoomListeners();
      initialSyncDone = false;
      bufferedRealtimeEvents.length = 0;
      currentRoomCode = '';
      roomTitle.textContent = 'Room: ------';
      setScreen('join');
      updateSendState();
      messageInput.value = '';
      charCounter.style.display = 'none';
      displayNameInput.focus();
    }

    function enqueueLocalPending(data) {
      const node = renderMessage(data, { own: true, pending: true });
      if (data.localId) pendingByLocalId.set(data.localId, node);
      return node;
    }

    function sendMessage() {
      const text = safeString(messageInput.value);
      if (!text || !currentRoomCode || !roomMessagesRef) return;

      const payload = {
        sender: currentUserName || 'You',
        text: text.slice(0, 500),
        timestamp: Date.now(),
        clientId: myClientId,
        localId: (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : `msg_${Date.now()}_${Math.random().toString(16).slice(2)}`
      };

      // Optimistic UI: show immediately, then let Firebase echo confirm it.
      enqueueLocalPending(payload);

      try {
        roomMessagesRef.push(payload);
      } catch (err) {
        // Even if the SDK queues offline writes, keep the local bubble visible.
        console.error('Failed to push message:', err);
      }

      messageInput.value = '';
      updateSendState();
      messageInput.focus();
    }

    function handleJoinClick() {
      enterRoom().catch((err) => {
        console.error(err);
        alert('Could not join the room. Check your Firebase config and database rules.');
      });
    }

    // ---- Events ----
    sanitizeAndRestoreName();
    updateSendState();

    displayNameInput.addEventListener('input', saveName);
    roomCodeInput.addEventListener('input', () => {
      roomCodeInput.value = sanitizeRoomCode(roomCodeInput.value);
      updateSendState();
    });
    roomCodeInput.addEventListener('keydown', (e) => {
      const allowed = ['Backspace','Delete','Tab','ArrowLeft','ArrowRight','Home','End','Enter'];
      if (allowed.includes(e.key) || (e.ctrlKey || e.metaKey)) return;
      if (!/^\d$/.test(e.key)) e.preventDefault();
    });

    generateCodeBtn.addEventListener('click', () => {
      roomCodeInput.value = generateRoomCode();
      updateSendState();
      roomCodeInput.focus();
      roomCodeInput.select();
    });

    joinBtn.addEventListener('click', handleJoinClick);
    roomCodeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleJoinClick();
    });
    displayNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleJoinClick();
    });

    messageInput.addEventListener('input', () => {
      updateSendState();
      if (messageInput.value.length >= 400) {
        charCounter.style.display = 'block';
        charCounter.textContent = `${messageInput.value.length}/500`;
      }
    });
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    composer.addEventListener('submit', (e) => {
      e.preventDefault();
      sendMessage();
    });

    copyBtn.addEventListener('click', copyRoomCode);
    leaveBtn.addEventListener('click', leaveRoom);
    qrBtn.addEventListener('click', openQrPopup);
    closeQrBtn.addEventListener('click', closeQrPopup);
    qrOverlay.addEventListener('click', (e) => {
      if (e.target === qrOverlay) closeQrPopup();
    });
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeQrPopup();
    });

    // ---- Firebase boot ----
    try {
      firebase.initializeApp(firebaseConfig);
      app = firebase.app();
      db = firebase.database();

      // The Realtime Database SDK handles offline writes and local cache.
      // This guarded call is here to satisfy environments that expose such a hook,
      // but the app remains functional if the method does not exist.
      if (typeof db.enablePersistenceCaching === 'function') {
        db.enablePersistenceCaching();
      }

      setStatus(navigator.onLine);
    } catch (err) {
      console.error('Firebase initialization failed:', err);
      setStatus(false);
    }

    // Focus the large room code field by default.
    roomCodeInput.focus();

    // Expose the current room in the QR text area when the popup opens.
    // No-op here; kept for clarity of flow.
  </script>
 <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
  }
  </script>
</body>
